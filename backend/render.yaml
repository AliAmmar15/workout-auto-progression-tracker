databases:
  - name: workout-tracker-db
    plan: free
    databaseName: workout_tracker
    ipAllowList: []

services:
  - type: web
    name: workout-tracker-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: workout-tracker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.6"
